aid: allegion
name: Allegion
description: >-
  Allegion plc is a global security products company with $3.8B in 2024 revenue, 13,000+ employees, and 30+ brands
  across 120 countries (Schlage, Von Duprin, LCN, CISA, Steelcraft, Interflex, SimonsVoss, Yonomi). The Allegion
  Developer Portal exposes two documented integration surfaces - the Schlage Home API V2 (residential WiFi smart locks)
  and the ENGAGE Cloud Credentialing API (commercial BLE mobile credentials), plus iOS and Android Device Communication
  and BLE Mobile Access SDKs gated behind an Allegion Security Token Agreement.
