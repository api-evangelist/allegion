apis:
  - aid: allegion:schlage-home-api
    name: Schlage Home API
    description: >-
      REST + webhook API for the Schlage Home residential smart-lock platform. Designed for business and commercial
      integrations (partner apps, smart-home automation platforms) that scale across residential deployments of
      WiFi-enabled Schlage Encode, Encode Plus, and Encode Lever devices. Uses OAuth 2.0 Authorization Code flow against
      account.schlage.com, async 202 ACCEPTED command pattern, and webhook subscriptions for device, command, access
      code, and account events.
    humanURL: https://developer.allegion.com/en/products/schlage-home/schlage-home-api.html
    baseURL: https://api.allegion.com/schlage-home
    tags:
      - Smart Lock
