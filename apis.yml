  - aid: allegion:engage-credentialing-api
    name: ENGAGE Cloud Credentialing API
    description: >-
      REST API on the Allegion Device Management and Mobile Access Cloud (Engage Cloud) for managing BLE Mobile
      Credentials used to unlock ENGAGE Gen 2 hardware (Schlage Control B, NDEB, LEBMS/LEBMD locks; MTKB readers; Von
      Duprin RU/RM). Brokers interactions between Access Control Systems (ACS), the Allegion Mobile SDKs, and Schlage
      hardware. Authentication requires an alle-subscription-key header plus a Basic Auth token derived from ENGAGE
      credentials; integrators must sign the Allegion Security Token Agreement before receiving SDK and API access.
    humanURL: https://developer.allegion.com/en/products/schlage-mobile-credentials/credentialing-api.html
    baseURL: https://api.allegion.com/engage
    tags:
      - Mobile Credentials
      - BLE
